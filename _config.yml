remote_theme: mmistakes/minimal-mistakes@4.26.2

title: "Systems and Signals"
subtitle: "DevOps · MLOps · Security — learn by building."
description: "Systems and Signals publishes hands-on, project-based articles on DevOps, cloud infrastructure, containers, and platform engineering. Every article ships working code."
url: "https://syssignals.com"
baseurl: ""
repository: "syssignals/30-days-devops"

author:
  name: "Vishwas Sharma"
  bio: "DevOps Engineer. I write project-based articles on infrastructure, containers, and CI/CD — the kind of content I wished existed when I was learning."
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/vsindevops"
    - label: "X / Twitter"
      icon: "fab fa-fw fa-x-twitter"
      url: "https://x.com/syssignals"

# Search
search: true
search_full_content: true

# Build settings
markdown: kramdown
highlighter: rouge
permalink: /articles/:year/:month/:day/:title/

kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    block:
      line_numbers: false

# Plugins (GitHub Pages whitelisted)
plugins:
  - jekyll-remote-theme
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache

# Pagination
paginate: 10
paginate_path: /page:num/

# Theme settings
minimal_mistakes_skin: "dark"

# Site-wide defaults
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: false
      read_time: true
      comments: false
      share: true
      related: false
      toc: true
      toc_sticky: true
      toc_label: "On this page"
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true

# Collections
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

# Include _pages directory
include:
  - _pages

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - "*.gem"
  - vendor
  - .bundle
  - .sass-cache
