<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="syssignals social logo">
  <!-- Background -->
  <rect width="512" height="512" fill="#0d1117"/>

  <!-- Subtle background grid lines (signal/data aesthetic) -->
  <g stroke="#21262d" stroke-width="1" opacity="0.8">
    <line x1="0"   y1="64"  x2="512" y2="64"/>
    <line x1="0"   y1="128" x2="512" y2="128"/>
    <line x1="0"   y1="192" x2="512" y2="192"/>
    <line x1="0"   y1="256" x2="512" y2="256"/>
    <line x1="0"   y1="320" x2="512" y2="320"/>
    <line x1="0"   y1="384" x2="512" y2="384"/>
    <line x1="0"   y1="448" x2="512" y2="448"/>
    <line x1="64"  y1="0"   x2="64"  y2="512"/>
    <line x1="128" y1="0"   x2="128" y2="512"/>
    <line x1="192" y1="0"   x2="192" y2="512"/>
    <line x1="256" y1="0"   x2="256" y2="512"/>
    <line x1="320" y1="0"   x2="320" y2="512"/>
    <line x1="384" y1="0"   x2="384" y2="512"/>
    <line x1="448" y1="0"   x2="448" y2="512"/>
  </g>

  <!-- Blue glow behind icon -->
  <circle cx="256" cy="206" r="100" fill="#58a6ff" opacity="0.06"/>

  <!-- Icon mark: 160x160 chip badge, centered horizontally -->
  <rect x="176" y="126" width="160" height="160" rx="28" fill="#161b22" stroke="#58a6ff" stroke-width="5"/>

  <!-- ECG signal pulse scaled to 160x160 box -->
  <!-- Box: x=176..336, y=126..286  center y=206 -->
  <polyline
    points="196,206 220,206 234,166 248,246 262,206 316,206"
    stroke="#58a6ff"
    stroke-width="7"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />

  <!-- Wordmark centered -->
  <text
    x="256"
    y="358"
    font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif"
    font-size="58"
    font-weight="700"
    letter-spacing="-1.5"
    text-anchor="middle"
  >
    <tspan fill="#58a6ff">sys</tspan><tspan fill="#e6edf3">signals</tspan>
  </text>

  <!-- Tagline -->
  <text
    x="256"
    y="400"
    font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif"
    font-size="16"
    font-weight="400"
    fill="#8b949e"
    text-anchor="middle"
    letter-spacing="3"
  >DEVOPS · MLOPS · SECURITY</text>
</svg>
