<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 248 56" fill="none" role="img" aria-label="syssignals logo monochrome">
  <!-- Icon mark: chip / system badge -->
  <rect x="4" y="4" width="48" height="48" rx="10" fill="none" stroke="#ffffff" stroke-width="2"/>
  <!-- ECG signal pulse -->
  <polyline
    points="10,28 18,28 22,13 26,43 30,28 46,28"
    stroke="#ffffff"
    stroke-width="2.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />
  <!-- Wordmark -->
  <text
    x="66"
    y="36"
    font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif"
    font-size="24"
    font-weight="700"
    letter-spacing="-0.5"
    fill="#ffffff"
  >syssignals</text>
</svg>
