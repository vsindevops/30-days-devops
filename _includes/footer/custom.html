<!-- ============================================================
     Buy Me a Coffee — floating button + end-of-article block
     Replace YOUR_BMC_USERNAME with your actual BMaC username
     ============================================================ -->

{% assign bmc_username = "YOUR_BMC_USERNAME" %}

<!-- 1. Floating widget (appears on every page, bottom-right) -->
<script
  data-name="BMC-Widget"
  data-cfasync="false"
  src="https://cdnjs.buymeacoffee.com/1.0.0/widget.prod.min.js"
  data-id="{{ bmc_username }}"
  data-description="Support me on Buy me a coffee!"
  data-message="Enjoying the articles? A coffee keeps them coming ☕"
  data-color="#FFDD00"
  data-position="Right"
  data-x_margin="18"
  data-y_margin="18">
</script>

<!-- 2. End-of-article support block (injected after .page__content on single posts) -->
<script>
document.addEventListener('DOMContentLoaded', function () {
  var content = document.querySelector('article.page .page__content');
  if (!content) return;

  var block = document.createElement('div');
  block.className = 'bmc-article-block';
  block.innerHTML = [
    '<div class="bmc-article-inner">',
    '  <div class="bmc-text">',
    '    <p class="bmc-heading">☕ Found this useful?</p>',
    '    <p class="bmc-sub">Every article is free and comes with working code. If it saved you time, a coffee means a lot.</p>',
    '  </div>',
    '  <a href="https://buymeacoffee.com/{{ bmc_username }}" target="_blank" rel="noopener noreferrer" class="bmc-btn">',
    '    Buy me a coffee',
    '  </a>',
    '</div>'
  ].join('');

  content.parentNode.insertBefore(block, content.nextSibling);
});
</script>
