<!-- Back to top button -->
<script>
document.addEventListener('DOMContentLoaded', function () {
  var btn = document.createElement('button');
  btn.id = 'back-to-top';
  btn.setAttribute('aria-label', 'Back to top');
  btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"></polyline></svg>';
  document.body.appendChild(btn);

  window.addEventListener('scroll', function () {
    btn.classList.toggle('visible', window.scrollY > 300);
  }, { passive: true });

  btn.addEventListener('click', function () {
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });
});
</script>

<!-- Reading progress bar — article pages only -->
<script>
document.addEventListener('DOMContentLoaded', function () {
  if (!document.body.classList.contains('layout--single')) return;

  var bar = document.createElement('div');
  bar.id = 'reading-progress';
  document.body.prepend(bar);

  window.addEventListener('scroll', function () {
    var docHeight = document.documentElement.scrollHeight - window.innerHeight;
    var progress = docHeight > 0 ? (window.scrollY / docHeight) * 100 : 0;
    bar.style.width = progress + '%';
  }, { passive: true });
});
</script>

<!-- GoatCounter: live page view counts -->
<script>
(function () {
  var GC = 'https://syssignals.goatcounter.com/counter/';

  var EYE = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" '
    + 'stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" '
    + 'style="display:inline;vertical-align:-1px;margin-right:3px">'
    + '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>'
    + '<circle cx="12" cy="12" r="3"></circle></svg>';

  function fetchCount(path, cb) {
    fetch(GC + encodeURIComponent(path) + '.json')
      .then(function (r) { return r.ok ? r.json() : null; })
      .then(function (d) { cb(d && d.count && d.count !== '0' ? d.count : null); })
      .catch(function () { cb(null); });
  }

  function makeChip(count) {
    var span = document.createElement('span');
    span.className = 'gc-views';
    span.innerHTML = EYE + count + ' views';
    return span;
  }

  document.addEventListener('DOMContentLoaded', function () {

    // Article pages: inject next to read-time in .page__meta
    var meta = document.querySelector('article.page .page__meta');
    if (meta) {
      fetchCount(window.location.pathname, function (count) {
        if (!count) return;
        var sep = document.createElement('span');
        sep.className = 'page__meta-sep';
        sep.innerHTML = ' &bull; ';
        meta.appendChild(sep);
        meta.appendChild(makeChip(count));
      });
    }

    // Homepage / archive: inject into each article card
    document.querySelectorAll('.list__item').forEach(function (item) {
      var link = item.querySelector('.archive__item-title a');
      if (!link) return;
      var path = new URL(link.getAttribute('href'), window.location.origin).pathname;
      fetchCount(path, function (count) {
        if (!count) return;
        var cardMeta = item.querySelector('.page__meta');
        if (!cardMeta) return;
        var sep = document.createElement('span');
        sep.className = 'page__meta-sep';
        sep.innerHTML = ' &bull; ';
        cardMeta.appendChild(sep);
        cardMeta.appendChild(makeChip(count));
      });
    });

  });
})();
</script>

<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', function () {
    mermaid.initialize({
      startOnLoad: false,
      theme: 'dark',
      gitGraph: { rotateCommitLabel: false, mainBranchName: 'main' },
      flowchart: { useMaxWidth: true, htmlLabels: true }
    });

    // Mermaid blocks have no Rouge wrapper — they render as bare <pre><code>
    document.querySelectorAll('code.language-mermaid').forEach(function (code) {
      var div = document.createElement('div');
      div.className = 'mermaid';
      div.textContent = code.textContent;
      code.parentElement.replaceWith(div);
    });

    mermaid.run();
  });
</script>

<script>
document.addEventListener('DOMContentLoaded', function () {

  var COPY_ICON = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>';
  var CHECK_ICON = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>';

  function copyText(text, btn) {
    // Modern clipboard API (requires HTTPS — works on syssignals.com)
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(function () {
        showCopied(btn);
      }).catch(function () {
        fallback(text, btn);
      });
    } else {
      fallback(text, btn);
    }
  }

  // Fallback for HTTP or older browsers
  function fallback(text, btn) {
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.cssText = 'position:fixed;top:0;left:0;opacity:0;pointer-events:none';
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    try { document.execCommand('copy'); showCopied(btn); } catch (e) {}
    document.body.removeChild(ta);
  }

  function showCopied(btn) {
    btn.innerHTML = CHECK_ICON + '<span>Copied!</span>';
    btn.classList.add('copied');
    setTimeout(function () {
      btn.innerHTML = COPY_ICON + '<span>Copy</span>';
      btn.classList.remove('copied');
    }, 2000);
  }

  var LANG_NAMES = {
    'bash': 'Bash', 'sh': 'Shell', 'shell': 'Shell',
    'javascript': 'JS', 'typescript': 'TS',
    'python': 'Python', 'ruby': 'Ruby', 'go': 'Go', 'rust': 'Rust',
    'yaml': 'YAML', 'json': 'JSON', 'toml': 'TOML', 'ini': 'INI',
    'html': 'HTML', 'css': 'CSS', 'scss': 'SCSS', 'sql': 'SQL',
    'dockerfile': 'Dockerfile', 'nginx': 'Nginx', 'hcl': 'HCL',
    'diff': 'Diff', 'makefile': 'Makefile', 'xml': 'XML',
  };

  document.querySelectorAll('div.highlight').forEach(function (block) {
    // Skip Mermaid diagram blocks (no pre inside after conversion)
    var pre = block.querySelector('pre');
    if (!pre) return;

    // Language label — Rouge puts language-* on the outer wrapper div,
    // which is the parent of div.highlight (e.g. div.language-bash.highlighter-rouge)
    var outer = block.parentElement;
    var match = Array.from(outer.classList).find(function (c) {
      return c.startsWith('language-');
    });
    if (match) {
      var lang = match.replace('language-', '');
      var skip = ['plaintext', 'text', 'console', 'mermaid'];
      if (!skip.includes(lang)) {
        var label = document.createElement('span');
        label.className = 'code-lang';
        label.textContent = LANG_NAMES[lang] || lang.toUpperCase();
        block.appendChild(label);
        block.classList.add('has-lang-label');
      }
    }

    var btn = document.createElement('button');
    btn.className = 'copy-btn';
    btn.setAttribute('aria-label', 'Copy code to clipboard');
    btn.innerHTML = COPY_ICON + '<span>Copy</span>';
    block.appendChild(btn);

    btn.addEventListener('click', function () {
      var codeEl = block.querySelector('pre code') || pre;
      var text = codeEl.textContent.replace(/\n$/, '');
      copyText(text, btn);
    });
  });

});
</script>
